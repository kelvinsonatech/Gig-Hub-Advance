notes:
  - Assuming generated React Query hooks from orval are available at `@workspace/api-client-react`
  - Overriding `window.fetch` globally in App.tsx to automatically inject the Bearer token since we cannot modify the generated `custom-fetch.ts` directly.
  - The API base path is `/api`.
