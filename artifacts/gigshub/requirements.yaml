images:
  - path: "artifacts/gigshub/public/images/hero-fintech.png"
    description: "A beautiful, vibrant 3D illustration of a young African woman smiling and using a smartphone, surrounded by floating colorful abstract shapes, internet data symbols, and glowing notification badges. Clean white and light blue gradient background, modern 3D clay style, premium fintech aesthetic."
    aspect_ratio: "16:9"
  - path: "artifacts/gigshub/public/images/afa-card-placeholder.png"
    description: "A stylized 3D representation of a futuristic identification card floating in mid-air with soft glowing edges and geometric patterns on a clean light background. Modern and professional."
